; Benchmark control-group pool tuning, mounted into /usr/local/etc/php-fpm.d/.
; The "zz-" prefix isn't needed here because compose mounts this as the
; last-loaded file; it overrides the image's default www.conf (pm=dynamic, 5).
[www]
; Match Octane's worker count so the comparison is apples-to-apples: a fixed pool
; of PHP worker processes, each handling one request at a time. benchmark.sh rewrites
; max_children to OCTANE_WORKERS for the run; this committed default is the 2-cpu case.
pm = static
pm.max_children = 4

; Surface PHP worker stdout/stderr in `docker compose logs fpm`.
catch_workers_output = yes
decorate_workers_output = no
