; Benchmark control-group pool tuning, mounted into /usr/local/etc/php-fpm.d/.
; The "zz-" prefix isn't needed here because compose mounts this as the
; last-loaded file; it overrides the image's default www.conf (pm=dynamic, 5).
[www]
; Match Octane's --workers=8 so the comparison is apples-to-apples:
; a fixed pool of 8 PHP worker processes, each handling one request at a time.
pm = static
pm.max_children = 8

; Surface PHP worker stdout/stderr in `docker compose logs fpm`.
catch_workers_output = yes
decorate_workers_output = no
