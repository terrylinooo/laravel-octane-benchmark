; OPcache tuning for the FPM control group. OPcache is already enabled in the
; image; these settings make the steady state closer to Octane's (code is
; compiled once and never re-read from disk).
opcache.validate_timestamps=0
opcache.memory_consumption=128
opcache.max_accelerated_files=20000
opcache.interned_strings_buffer=16
