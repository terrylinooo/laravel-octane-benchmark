# nginx front for the PHP-FPM control group. Serves static files from the
# shared project mount and proxies PHP to the fpm container over FastCGI.
server {
    listen 8000;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        # "fpm" is the compose service name; 9000 is php-fpm's FastCGI port.
        fastcgi_pass fpm:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        # Paths line up because both containers mount the project at the same path.
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    # Don't expose dotfiles (except ACME well-known).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
