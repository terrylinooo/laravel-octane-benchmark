name: Benchmark All

on:
  workflow_dispatch:
    inputs:
      workloads:
        description: "Workloads (space-separated)"
        default: "hello hash mandelbrot json db"
      concurrencies:
        description: "Concurrency levels (space-separated)"
        default: "8 16 32 64 128"
      runs:
        description: "Runs per cell"
        default: "2"
      duration:
        description: "Measured seconds per run"
        default: "20"
      warmup:
        description: "Discarded warmup seconds per concurrency level"
        default: "10"
      publish:
        description: "Deploy the combined dashboard to GitHub Pages"
        type: boolean
        default: true

jobs:
  swoole:
    uses: ./.github/workflows/_benchmark-server.yml
    with:
      server: swoole
      workloads: ${{ inputs.workloads }}
      concurrencies: ${{ inputs.concurrencies }}
      runs: ${{ inputs.runs }}
      duration: ${{ inputs.duration }}
      warmup: ${{ inputs.warmup }}
    secrets: inherit

  openswoole:
    uses: ./.github/workflows/_benchmark-server.yml
    with:
      server: openswoole
      workloads: ${{ inputs.workloads }}
      concurrencies: ${{ inputs.concurrencies }}
      runs: ${{ inputs.runs }}
      duration: ${{ inputs.duration }}
      warmup: ${{ inputs.warmup }}
    secrets: inherit

  roadrunner:
    uses: ./.github/workflows/_benchmark-server.yml
    with:
      server: roadrunner
      workloads: ${{ inputs.workloads }}
      concurrencies: ${{ inputs.concurrencies }}
      runs: ${{ inputs.runs }}
      duration: ${{ inputs.duration }}
      warmup: ${{ inputs.warmup }}
    secrets: inherit

  frankenphp:
    uses: ./.github/workflows/_benchmark-server.yml
    with:
      server: frankenphp
      workloads: ${{ inputs.workloads }}
      concurrencies: ${{ inputs.concurrencies }}
      runs: ${{ inputs.runs }}
      duration: ${{ inputs.duration }}
      warmup: ${{ inputs.warmup }}
    secrets: inherit

  fpm:
    uses: ./.github/workflows/_benchmark-server.yml
    with:
      server: fpm
      workloads: ${{ inputs.workloads }}
      concurrencies: ${{ inputs.concurrencies }}
      runs: ${{ inputs.runs }}
      duration: ${{ inputs.duration }}
      warmup: ${{ inputs.warmup }}
    secrets: inherit

  deploy:
    needs: [swoole, openswoole, roadrunner, frankenphp, fpm]
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download this batch's benchmark artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: benchmark-*-${{ github.run_id }}
          path: benchmark-artifacts

      - name: Rebuild combined dashboard
        env:
          BENCHMARK_RUN_ID: ${{ github.run_id }}
        run: |
          rm -rf results docs
          mkdir -p results
          find benchmark-artifacts -path '*/results/*.json' -exec cp {} results/ \;
          python3 bench/aggregate.py

      - name: Verify all server results
        run: |
          test -f docs/index.html
          test -f docs/summary.json
          for server in swoole openswoole roadrunner frankenphp fpm; do
            find results -name "${server}_*.json" -print -quit | grep -q .
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
