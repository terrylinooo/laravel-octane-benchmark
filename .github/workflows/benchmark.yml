name: Benchmark

# The project's default measurement environment: a GitHub Actions ubuntu-24.04
# runner = 4 vCPU / 16 GB RAM. benchmark.sh splits the host in half: the SUT gets the
# lower cores (2 cpus, cpuset 0-1) and the wrk generator the upper cores (2-3), so the
# generator is always isolated. Reports are therefore for a 2-cpu server (recorded in
# the manifest caps). Shared runners are noisy neighbors, so treat the numbers as
# RELATIVE-ONLY (who wins, where it flips) with run-to-run spread shown.
#
# Composer runs on the host (setup-php below); the app servers run in Docker.
# Manual only by default — the full matrix is hours; use the inputs to scale.

on:
  workflow_dispatch:
    inputs:
      servers:
        description: "Servers (space-separated)"
        default: "swoole openswoole roadrunner frankenphp fpm"
      workloads:
        description: "Workloads (space-separated)"
        default: "hello hash mandelbrot json db"
      concurrencies:
        description: "Concurrency levels (space-separated)"
        default: "8 32 128"
      runs:
        description: "Runs per cell (median of)"
        default: "2"
      duration:
        description: "Measured seconds per run"
        default: "20"
      warmup:
        description: "Discarded warmup seconds per (server, workload)"
        default: "8"
      publish:
        description: "Deploy docs/ to GitHub Pages (Settings -> Pages -> Source: GitHub Actions)"
        type: boolean
        default: false
  # schedule:
  #   - cron: "0 6 1 * *"   # monthly, to re-run on new PHP/Octane/server releases

env:
  GITHUB_REGISTRY: ghcr.io
  GITHUB_USERNAME: ${{ github.actor }}

jobs:
  benchmark:
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    permissions:
      contents: read
    steps:
      # `act` runs this workflow locally but ships without docker compose.
      - name: Install `docker-compose` for local simulations
        uses: KengoTODA/actions-setup-docker-compose@v1
        if: ${{ env.ACT }}
        with:
          version: '2.14.2'

      - name: Checkout
        uses: actions/checkout@v4

      # Pin PHP to 8.4 to match the app containers' runtime (the project allows
      # ^8.3, so the runner default also works) and to provide composer.
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer

      # Authenticate to GHCR only when a PAT is provided (private packages). If
      # GH_PAT is unset the step is skipped — public ghcr.io/airygen images pull
      # anonymously, and an empty password would otherwise fail with
      # "Error: Password required".
      - name: Login to GitHub Container Registry
        if: ${{ env.GH_PAT != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_REGISTRY }}
          username: ${{ env.GITHUB_USERNAME }}
          password: ${{ env.GH_PAT }}

      - name: Cache PHP packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # make deps = composer install (host); make key = artisan key:generate.
      - name: Prepare environment
        run: |
          cp .env.example .env
          make deps
          make key

      - name: Build images
        run: make build

      - name: Run benchmark
        env:
          SERVERS: ${{ inputs.servers }}
          WORKLOADS: ${{ inputs.workloads }}
          CONCURRENCIES: ${{ inputs.concurrencies }}
          RUNS: ${{ inputs.runs }}
          DURATION: ${{ inputs.duration }}
          WARMUP: ${{ inputs.warmup }}
        run: make bench

      - name: Aggregate results
        run: make report

      - name: Upload results + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.run_id }}
          path: |
            results/*.json
            RESULTS.md
            docs/

      # Official GitHub Pages deployment (Settings -> Pages -> Source: GitHub
      # Actions). No Jekyll, no branch — docs/ is served as static files exactly
      # as generated. The deploy itself happens in the `deploy` job below.
      - name: Upload Pages artifact
        if: ${{ inputs.publish }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  # Separate job so the page deploy gets its own narrow pages:write permission
  # and the github-pages environment. Only runs when publish=true.
  deploy:
    needs: benchmark
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
